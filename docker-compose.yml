services:
  rowsplit:
    build: .
    # We remove the public ports from here because only Nginx will talk to the internet
    expose:
      - "5000"
    env_file: .env
    volumes:
      - rowsplit_data:/app/data
    restart: unless-stopped

  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # This links your new certificates into the container
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - rowsplit

volumes:
  rowsplit_data:
