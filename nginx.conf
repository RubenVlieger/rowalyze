server {
    listen 80;
    server_name rowalyse.rubenvlieger.nl;
    # Redirect all HTTP traffic to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name rowalyse.rubenvlieger.nl;

    # SSL Certificate Paths
    ssl_certificate /etc/letsencrypt/live/rowalyse.rubenvlieger.nl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rowalyse.rubenvlieger.nl/privkey.pem;

    # Basic SSL optimizations
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://rowsplit:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}